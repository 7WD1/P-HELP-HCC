project:
  name: P-HLPL-HCC
  task: eight_class_hcc_survival

data:
  objective: hard_classification
  target_time_col: overall_survival_months
  event_col: event
  label_col: survival_class
  surgical_strategy_col: surgical_strategy
  aetiology_col: dominant_aetiology
  curated_dim: 67
  agent_state_dim: 46
  survival_bins_months: [0, 6, 12, 24, 36, 48, 60, 72]

splits:
  outer_folds: 5
  inner_val_fraction: 0.2
  seeds: [42, 123, 2024, 31415, 65537]
  stratify_on: [survival_class, event]

phase_a:
  state_representation_enabled: true
  tumor_update_enabled: true
  fibrosis_update_enabled: true
  dynamics_input_scale: physical_units_required
  agent_blocks:
    patient: true
    tumor: true
    liver: true
    treatment: true
    guideline: true
    explanation: true
  d_max_cm: 20.0
  process_noise_std: 0.05

phase_c:
  learners: [logistic, gradient_boosting_or_xgboost, random_forest, mlp]
  fusion_alpha: 0.60
  scenario_auxiliary:
    enabled: true
    loss_weight: 0.20
    n_actions: 6
  random_forest:
    n_estimators: 500
    max_depth: 10
    class_weight: balanced
  xgboost:
    enabled_if_installed: true
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
  gradient_boosting_fallback:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 3
  mlp:
    hidden_dims: [256, 128, 64]
    dropout: 0.2
    activation: GELU
    batch_size: 32
    epochs: 100
    patience: 15
    learning_rate: 0.001
    weight_decay: 0.0
    focal_gamma: 1.5
    class_weights: [1.0, 1.5, 1.7, 2.1, 2.5, 2.7, 2.3, 4.5]
  clustering:
    enabled: true
    k: 4
    pca_variance: 0.90
    init: k-means++
    n_init: 20
  counterfactual:
    enabled: true
    actions: [None, Resection, TACE, RFA, Sorafenib, Combo]
    bootstrap_replicates: 200
    propensity_gate: [0.05, 0.95]
    propensity_trim: 0.05
    guideline_confidence_threshold: 0.30
    horizon_months: 72
    report_horizon_months: 12
  observational_analysis:
    pretreatment_only: true
    nuisance_crossfit_folds: 5
    estimator: augmented_inverse_probability_weighting
    propensity_trim: 0.05
    patient_bootstrap_replicates: 1000
    causal_claim: false

phase_e:
  cox:
    enabled: true
    epochs: 300
    learning_rate: 0.03
    l1: 0.001
    l2: 0.001
  loss:
    enabled: true
    lambda_cal: 0.4
    lambda_exp: 0.3
    lambda_clin: 0.2
    tanh_kappa: 5.0
    clinical_risk_state_indices: [12, 13, 14, 15, 16, 17, 25]
    clinical_risk_state_signs: [1, 1, 1, 1, 1, 1, 1]

phase_p:
  enabled: true
  ipcw_sample_reweighting_enabled: true
  residual_weight_strength: 1.0
  minimum_positive_weight: 0.25
  maximum_weight: 4.0
  model_selection_enabled: true
  checkpoint_residual_weight: 0.20
  candidate_residual_weight: 0.10
  platt_calibration_enabled: true
  soft_error_threshold: 0.18
  hard_error_threshold: 0.32
  abstention_entropy_soft: 0.65
  abstention_entropy_hard: 0.85
  online_learning_rate: 0.005
  proximal_weight: 0.01
  monitor_window: 30
  retrain_buffer: 200
  classification_calibration_mix: 0.5

safeguards:
  federated:
    enabled: false
    framing: future_work
    dp_sgd:
      epsilon_per_round: 0.4
      planned_rounds: 100
      epsilon_total_design_budget: 4.0
      delta: 1.0e-5
      noise_multiplier_sigma: 1.1
      l2_clip_C: 1.0
    secure_aggregation:
      protocol: bonawitz
  ood_detection:
    method: mahalanobis
    per_class_centroid: true
    percentile_threshold: 99
  audit_log:
    primitive: hash_chained_signed_append
    daily_anchor: hospital_HSM_signed_root
    retention_days: 2555
